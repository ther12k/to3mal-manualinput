server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle favicon - return 204 if not found
    location = /favicon.ico {
        try_files $uri =204;
    }

    location / {
        # Try to serve file directly, fall back to index.html
        # Use 'break' to avoid redirect loops
        try_files $uri $uri/ /index.html;
        # Ensure we don't get into a loop
        error_page 404 = /index.html;
    }

    # Proxy API requests to external backend
    location /api {
        proxy_pass http://183.91.69.74/AGTOSNUS_Prod/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy Picture requests to the backend
    location /pictures {
        proxy_pass http://183.91.69.74/AGTOSNUS_Prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
