services:
  to3mal-postgate:
    image: nginx:alpine
    container_name: to3mal-postgate
    ports:
      - "3180:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-logs:/var/log/nginx
    depends_on:
      - log-receiver
    restart: unless-stopped
    networks:
      - to3mal-network

  log-receiver:
    build:
      context: .
      dockerfile: log-receiver.Dockerfile
    container_name: log-receiver
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./logs:/logs
      - ./log-receiver.py:/app/log-receiver.py:ro
    restart: unless-stopped
    networks:
      - to3mal-network

  to3mal-log-shipper:
    build:
      context: .
      dockerfile: log-shipper.Dockerfile
    container_name: to3mal-log-shipper
    volumes:
      - ./logs:/app-logs:ro
      - ./nginx-logs:/nginx-logs:ro
    restart: unless-stopped
    networks:
      - to3mal-network

networks:
  to3mal-network:
    driver: bridge
