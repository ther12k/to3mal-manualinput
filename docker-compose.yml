services:
  to3mal-postgate:
    image: nginx:alpine
    container_name: to3mal-postgate
    ports:
      - "3000:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - to3mal-network

networks:
  to3mal-network:
    driver: bridge
