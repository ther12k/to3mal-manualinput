# Logging endpoint for frontend application logs
location = /api/log {
  access_log /var/log/nginx/app.log seq_main;

  # Only accept POST requests
  limit_except POST {
    deny all;
  }

  # Return 204 No Content immediately
  # The request body will be in the access log
  empty_gif;
  expires epoch;
  add_header Cache-Control "no-cache";
}
