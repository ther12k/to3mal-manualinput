# Nginx Proxy Configuration for TO3MAL PostGate Manual Input
# This proxies API requests to avoid CORS issues

server {
    listen 8080;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # API proxy with CORS
    location /api/ {
        # CORS headers (always ensures they're added even for error responses)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With' always;

        # Handle OPTIONS by returning 204 immediately
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Proxy all requests to the backend
        proxy_pass http://183.91.69.74/AGTOSNUS_Prod/api/;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}
